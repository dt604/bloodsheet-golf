# Codemagic CI/CD Configuration for BloodSheet Golf
# This file automates the build and submission of your iOS app to the App Store.

workflows:
  ios-release:
    name: BloodSheet Golf iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      # This requires you to set up the App Store Connect integration in Codemagic Team settings.
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web Application
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Set up keychain for code signing
        script: |
          keychain initialize
      - name: Fetch signing files from App Store Connect
        script: |
          # The ID 'com.bloodsheet.golf' must match your Capacitor app ID
          app-store-connect fetch-signing-files "com.bloodsheet.golf" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Configure Xcode project for code signing
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App && agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
